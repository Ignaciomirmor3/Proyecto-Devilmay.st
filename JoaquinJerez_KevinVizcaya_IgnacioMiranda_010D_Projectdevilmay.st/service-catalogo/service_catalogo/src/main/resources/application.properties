spring.application.name=service_catalogo

server.port = 8081

#conexiÃ³n a base de datos pacientes

spring.datasource.url=jdbc:mysql://localhost:3306/db_catalogo?createDatabaseIfNotExist=true&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# --- Configuración de Swagger inyectada ---
springdoc.api-docs.path=/api/v1/productos/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.cors.allowed-origins=http://localhost:8080 
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS 
spring.mvc.cors.allowed-headers=*
springdoc.swagger-ui.operations-sorter=alpha
springdoc.server-url=http://localhost:8080
