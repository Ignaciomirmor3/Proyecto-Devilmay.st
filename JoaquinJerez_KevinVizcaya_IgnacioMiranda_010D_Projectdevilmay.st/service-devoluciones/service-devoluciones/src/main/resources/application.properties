spring.application.name=service-devoluciones

server.port = 8090

spring.datasource.url=jdbc:mysql://localhost:3306/db_devoluciones?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Swagger
springdoc.api-docs.path=/api/v1/devoluciones/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.mvc.cors.allowed-origins=http://localhost:8080 
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS 
spring.mvc.cors.allowed-headers=*

# Ordena las operaciones de la UI
springdoc.swagger-ui.operations-sorter=alpha
# Indicar llamadas hacia el gateway
springdoc.server-url=http://localhost:8080