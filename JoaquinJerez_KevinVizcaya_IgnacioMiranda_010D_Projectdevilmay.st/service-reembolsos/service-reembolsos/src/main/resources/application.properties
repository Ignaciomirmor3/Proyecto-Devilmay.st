spring.application.name=service-reembolsos

server.port = 8087

#conexion a base de datos pacientes
spring.datasource.url=jdbc:mysql://localhost:3306/db_reembolsos?createDatabaseIfNotExist=true&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

devilmay.reservas.validar-orden=true
